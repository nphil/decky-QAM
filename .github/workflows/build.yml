name: Build and release

on:
  push:
    branches: ["**"]
    tags: ["v*"]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build frontend
        run: pnpm run build

      - name: Package plugin
        run: |
          PLUGIN=decky-QAM
          rm -rf out
          mkdir -p "out/$PLUGIN/dist"
          cp dist/index.js "out/$PLUGIN/dist/"
          cp main.py plugin.json package.json LICENSE README.md "out/$PLUGIN/"
          cd out
          zip -r "$PLUGIN.zip" "$PLUGIN"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: decky-QAM
          path: out/decky-QAM.zip

      - name: Publish release
        if: github.ref == 'refs/heads/claude/steam-deck-button-remap-DItw3' || startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          # Create/update a fixed release so Decky always has a stable
          # install URL. The runner creates the tag itself, so no local
          # tag push is required.
          tag_name: v1.0.0
          name: decky-QAM v1.0.0
          files: out/decky-QAM.zip
